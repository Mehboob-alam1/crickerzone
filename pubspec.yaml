name: score_zone
description: "A professional Cricket Live Score App with Modern UI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  dio: ^5.9.2
  http: ^1.2.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1
  go_router: ^17.2.0
  animate_do: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
